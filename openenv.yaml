version: "1.0"
name: "medtriage-er-simulator"
description: "A multi-agent healthcare triage environment evaluating dynamic resource allocation and ESI compliance."
tasks:
  - id: "routine_resource_allocation"
    name: "Routine Resource Allocation"
    description: "Accurately triage 5 concurrent patients into ESI levels 3-5 without over-allocating diagnostic resources."
    difficulty: "easy"
    grader: "tasks.routine_resource_allocation.grader:grade"
  - id: "hidden_deterioration_triage"
    name: "Hidden Deterioration Triage"
    description: "Identify a patient with a seemingly benign complaint whose vital signs (SpO2 < 92%) dictate an immediate ESI 2 escalation."
    difficulty: "medium"
    grader: "tasks.hidden_deterioration_triage.grader:grade"
  - id: "mass_casualty_surge"
    name: "Mass Casualty Surge"
    description: "Manage a sudden influx of 15 patients, rationing limited ICU beds based strictly on mortality probability and ESI 1 criteria."
    difficulty: "hard"
    grader: "tasks.mass_casualty_surge.grader:grade"
